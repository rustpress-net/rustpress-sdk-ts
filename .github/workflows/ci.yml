name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustpress-net/rustpress-core-devops/actions/ci-node@main
        with:
          node_version: '20'
          test_command: 'npx vitest run'
          # `npm run build` is exercised here too; if it fails the
          # subpath-export bundles will be empty and the smoke test
          # will catch that.
